<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Символ Инь‑Ян на SVG — волновое разделение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0e5ec 0%, #f0f4fa 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, 'Helvetica Neue', sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        svg {
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2), 0 0 0 4px #fff8;
            transition: transform 0.2s ease;
        }

        svg:hover {
            transform: scale(1.01);
        }

        .caption {
            text-align: center;
            margin-top: 1.5rem;
            font-weight: 500;
            color: #1e2a3a;
            background: #ffffffcc;
            display: inline-block;
            width: auto;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .info {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #2c3e50;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
    <div class="container">
        <!-- 
            SVG-реализация символа Инь‑Ян:
        -->
        <svg xmlns="http://www.w3.org/2000/svg"
             width="600" height="600"
             viewBox="0 0 600 600"
             aria-label="Инь‑Ян с волновым разделением, чёрная и белая половины">
             
            <defs>
                <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
                    <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000055"/>
                </filter>
            </defs>

            <!-- 
                === ЧЁРНАЯ ПОЛОВИНА ===
                Используется дуга A (sweep-flag = 1) — идёт по часовой стрелке от нижней точки (300,550)
                до верхней (300,50) через правую сторону круга.
                Затем волна (кубическая кривая Безье) возвращается из верхней точки в нижнюю,
                замыкая фигуру. Z явно замыкает контур.
                Волна симметрична относительно центра: контрольные точки (500,200) и (100,400) 
                создают плавный S-образный изгиб, делящий круг на две равные части.
            -->
            <path d="M 300,550 
                     A 250,250 0 0,1 300,50 
                     C 500,200 100,400 300,550 Z"
                  fill="#0a0a0a"
                  stroke="none"
                  filter="url(#softShadow)" />

            <!-- 
                === БЕЛАЯ ПОЛОВИНА ===
                Та же волна, но большая дуга идёт против часовой стрелки (sweep-flag = 0),
                то есть охватывает левую половину круга. В результате белая фигура дополняет чёрную.
            -->
            <path d="M 300,550 
                     A 250,250 0 0,0 300,50 
                     C 500,200 100,400 300,550 Z"
                  fill="#fefefe"
                  stroke="none" />

            <!-- 
                === ДОПОЛНИТЕЛЬНЫЕ ТОЧКИ (классический акцент Инь‑Ян) ===
                Белая точка размещается в области, занятой чёрной половиной (правая сторона).
                Чёрная точка — в белой половине (левая сторона).
            -->
            <circle cx="415" cy="300" r="38" fill="#ffffff" filter="url(#softShadow)" />
            <circle cx="185" cy="300" r="38" fill="#0a0a0a" filter="url(#softShadow)" />

            <!-- 
                Дополнительная эстетическая деталь: тонкая светлая обводка по всему кругу
            -->
            <circle cx="300" cy="300" r="250" fill="none" stroke="#2c2c2c" stroke-width="1.5" stroke-opacity="0.18" />
        </svg>
    </div>
    <div class="caption">☯  Инь‑Ян  |  Волновое разделение  ☯</div>
    <div class="info">Круг разделён симметричной кубической кривой Безье • SVG реализация</div>
</div>
</body>
</html>
