<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Обработка сигмоиды</title>
</head>
<body>
    <!-- Логин строго по условию (без пробелов и переводов строк) -->
    <h4>kostenkovd_2025</h4>

    <script>
        (function() {
            // Получаем строку запроса (например, "?A=2,4,6,8,1&B=1,-1,1,-1,1&C=4")
            const search = window.location.search;
            if (!search) {
                document.title = "0.000";
                return;
            }

            // Убираем начальный символ '?'
            const query = search.startsWith('?') ? search.slice(1) : search;
            const pairs = query.split('&');

            // Собираем параметры в объект
            const params = {};
            for (const pair of pairs) {
                const [key, value] = pair.split('=');
                if (key && value !== undefined) {
                    params[key] = value;
                }
            }

            // Проверяем наличие всех нужных параметров
            if (!params.A || !params.B || params.C === undefined) {
                document.title = "0.000";
                return;
            }

            // Разбираем A и B (массивы целых чисел)
            const A = params.A.split(',').map(item => parseInt(item, 10));
            const B = params.B.split(',').map(item => parseInt(item, 10));
            const C = parseInt(params.C, 10);

            // Длины должны совпадать, но на всякий случай берём минимальную
            const n = Math.min(A.length, B.length);
            let sum = 0;
            for (let i = 0; i < n; i++) {
                sum += A[i] * B[i];
            }

            // Вычисляем z и сигмоиду
            const z = sum + C;
            const y = 1 / (1 + Math.exp(-z));   // σ(z)

            // Форматируем результат для заголовка окна
            let titleValue;
            if (y === 1) {
                titleValue = "1";
            } else {
                // Простое отсечение до трёх знаков после запятой (без округления)
                const fraction = Math.floor((y % 1) * 1000);   // целое число от 0 до 999
                const padded = fraction.toString().padStart(3, '0');
                titleValue = "0." + padded;
            }

            // Устанавливаем заголовок окна
            document.title = titleValue;
        })();
    </script>
</body>
</html>
